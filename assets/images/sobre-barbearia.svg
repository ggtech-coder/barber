<svg viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="sobreTitle">
  <title id="sobreTitle">Ilustração de bancada de barbeiro com navalha, pente e produtos de barbearia</title>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b1613"/>
      <stop offset="100%" stop-color="#14110f"/>
    </linearGradient>
    <linearGradient id="brass2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0bc6d"/>
      <stop offset="100%" stop-color="#c9a24b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="700" fill="url(#bg2)"/>
  <circle cx="150" cy="120" r="200" fill="#7a2430" opacity="0.15"/>
  <circle cx="680" cy="560" r="220" fill="#c9a24b" opacity="0.10"/>

  <!-- shelf -->
  <rect x="80" y="470" width="640" height="14" rx="4" fill="url(#brass2)"/>
  <rect x="80" y="484" width="640" height="8" fill="#0e0b09"/>

  <!-- bottles -->
  <g fill="none" stroke="url(#brass2)" stroke-width="4" stroke-linejoin="round">
    <rect x="130" y="360" width="60" height="110" rx="10"/>
    <rect x="150" y="335" width="20" height="30" rx="4"/>
    <rect x="230" y="330" width="70" height="140" rx="10"/>
    <rect x="255" y="300" width="20" height="34" rx="4"/>
    <rect x="340" y="380" width="50" height="90" rx="10"/>
  </g>

  <!-- straight razor -->
  <g transform="translate(470,410) rotate(-25)" fill="none" stroke="url(#brass2)" stroke-width="5" stroke-linecap="round">
    <path d="M0 0 L180 0"/>
    <path d="M180 0 L230 26 L230 -6 Z" fill="#2a221c"/>
    <path d="M0 0 L-40 -18 L-40 18 Z" fill="#2a221c"/>
  </g>

  <!-- comb -->
  <g transform="translate(560,300)" fill="none" stroke="url(#brass2)" stroke-width="4" stroke-linecap="round">
    <path d="M0 0 L140 0"/>
    <path d="M0 0 L0 30 M20 0 L20 30 M40 0 L40 30 M60 0 L60 30 M80 0 L80 30 M100 0 L100 30 M120 0 L120 30 M140 0 L140 30"/>
  </g>

  <!-- hanging light -->
  <g stroke="url(#brass2)" stroke-width="3" fill="none">
    <path d="M400 0 L400 90"/>
    <path d="M360 90 Q400 150 440 90 Z"/>
  </g>

  <rect x="0" y="660" width="800" height="6" fill="url(#brass2)" opacity="0.6"/>
</svg>
